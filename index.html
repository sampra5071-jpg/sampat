<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Finder Pro+</title>

<!-- 🔥 Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- 🔥 Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- 🔥 Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-4">

    <!-- 🔝 HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">🎌 Anime Finder Pro</h1>
        <button id="themeToggle" class="btn btn-dark">🌙 Theme</button>
    </div>

    <!-- 🔍 SEARCH BOX -->
    <div class="card p-3 mb-4 shadow-sm">
        <div class="input-group">
            <input type="text" id="animeInput" class="form-control" placeholder="Search Anime...">
            <button class="btn btn-primary" onclick="searchAnime()">Search</button>
        </div>
        <div id="suggestions" class="list-group mt-2"></div>
    </div>

    <!-- 🎯 FILTERS -->
    <div class="row mb-4">
        <div class="col-md-6 mb-2">
            <select id="genreFilter" class="form-select">
                <option value="">All Genres</option>
                <option value="1">Action</option>
                <option value="4">Comedy</option>
                <option value="22">Romance</option>
            </select>
        </div>

        <div class="col-md-6 mb-2">
            <select id="ratingFilter" class="form-select">
                <option value="">Min Rating</option>
                <option value="6">6+</option>
                <option value="7">7+</option>
                <option value="8">8+</option>
            </select>
        </div>
    </div>

    <!-- 🔥 TRENDING -->
    <h3 class="mb-3">🔥 Trending Anime</h3>
    <div id="trending" class="row g-3"></div>

    <!-- 🔎 SEARCH RESULTS -->
    <h3 class="mt-5 mb-3">🔎 Search Results</h3>
    <div id="result" class="row g-3"></div>

    <!-- ❤️ FAVORITES -->
    <h3 class="mt-5 mb-3">❤️ Favorites</h3>
    <div id="favorites" class="row g-3"></div>

</div>

<!-- 🎥 TRAILER MODAL (Bootstrap) -->
<div class="modal fade" id="trailerModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">🎬 Trailer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <iframe id="trailerFrame" width="100%" height="400" allowfullscreen></iframe>
      </div>

    </div>
  </div>
</div>

<!-- 🔥 Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 Your Script -->
<script src="script.js"></script>

</body>
</html>
