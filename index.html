<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Finder Pro+</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Anime Finder Pro 🎌</h1>

    <button id="themeToggle">🌙 Toggle Theme</button>

    <div class="search-box">
        <input type="text" id="animeInput" placeholder="Search Anime...">
        <button onclick="searchAnime()">Search</button>
        <div id="suggestions"></div>
    </div>

    <div class="filters">
        <select id="genreFilter">
            <option value="">All Genres</option>
            <option value="1">Action</option>
            <option value="4">Comedy</option>
            <option value="22">Romance</option>
        </select>

        <select id="ratingFilter">
            <option value="">Min Rating</option>
            <option value="6">6+</option>
            <option value="7">7+</option>
            <option value="8">8+</option>
        </select>
    </div>

    <h2>🔥 Trending Anime</h2>
    <div id="trending" class="grid"></div>

    <h2>🔎 Search Results</h2>
    <div id="result" class="grid"></div>

    <h2>❤️ Favorites</h2>
    <div id="favorites" class="grid"></div>

</div>

<!-- Trailer Modal -->
<div id="trailerModal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <iframe id="trailerFrame" width="100%" height="400"></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
